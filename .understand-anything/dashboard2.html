    body{font-family:Inter,system-ui,Segoe UI,Arial;margin:0;padding:16px;background:#f7fafc;color:#0f172a}
    header{display:flex;align-items:center;gap:12px}
    .row{display:flex;gap:16px}
    .panel{background:white;padding:12px;border-radius:8px;box-shadow:0 1px 3px rgba(2,6,23,.08);flex:1;min-width:0}
    input[type=search]{width:100%;padding:8px;border:1px solid #e2e8f0;border-radius:6px}
    ul{list-style:none;padding:0;margin:8px 0;max-height:480px;overflow:auto}
    li{padding:8px;border-bottom:1px solid #eef2f7}
    .meta{font-size:12px;color:#475569}
    .badge{display:inline-block;padding:2px 6px;background:#eef2ff;color:#0b57d0;border-radius:999px;font-size:12px}
    pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#f8fafc;padding:8px;border-radius:6px}
    .node-title{font-weight:600}
    .sidebar{width:360px}
  </style>
</head>
<body>
  <header>
    <h1>Knowledge Graph Dashboard</h1>
    <div class="meta" id="projectMeta"></div>
  </header>

  <div style="margin-top:12px;" class="row">
    <div class="panel sidebar">
      <label><strong>Search</strong></label>
      <input type="search" id="search" placeholder="Search nodes, tags, filenames..." />
      <h4 style="margin-top:12px">Nodes</h4>
      <ul id="nodeList"></ul>
    </div>

    <div class="panel" style="flex:2">
      <div id="details">
        <p>Select a node to view details.</p>
      </div>
      <hr />
      <div>
        <h3>Layers</h3>
        <div id="layers"></div>
      </div>
      <hr />
      <div>
        <h3>Edges</h3>
        <ul id="edgeList"></ul>
      </div>
    </div>
  </div>

    function $(s){return document.querySelector(s)}
    const nodeListEl = document.getElementById('nodeList')
    const edgeListEl = document.getElementById('edgeList')
    const layersEl = document.getElementById('layers')
    const projectMeta = document.getElementById('projectMeta')
    projectMeta.textContent = GRAPH.project.name + ' — ' + GRAPH.project.frameworks.join(', ')

    const nodes = GRAPH.nodes
    const edges = GRAPH.edges

    function renderNodeItem(n){
      const li = document.createElement('li')
      li.innerHTML = `<div class="node-title">${n.name}</div><div class="meta">${n.filePath} • <span class="badge">${n.type}</span></div>`
      li.addEventListener('click', ()=> showDetails(n))
      return li
    }

    function showDetails(n){
      const html = `<h2 class=node-title>${n.name}</h2>
        <div class=meta>${n.filePath} • ${n.type}</div>
        <p>${n.summary}</p>
        <div>Tags: ${ (n.tags||[]).map(t=>'<span class="badge">'+t+'</span>').join(' ') }</div>
        <h4 style="margin-top:8px">Connected edges</h4>
        <ul>${edges.filter(e=>e.source===n.id||e.target===n.id).map(e=>'<li>'+e.type+': '+e.source+' → '+e.target+'</li>').join('')}</ul>`
      document.getElementById('details').innerHTML = html
    }

    function renderAll(){
      nodeListEl.innerHTML = ''
      nodes.forEach(n=> nodeListEl.appendChild(renderNodeItem(n)))
      edgeListEl.innerHTML = edges.map(e=>`<li>${e.type}: <strong>${e.source}</strong> → <strong>${e.target}</strong></li>`).join('')
      layersEl.innerHTML = GRAPH.layers.map(l=>`<div style="margin-bottom:8px"><strong>${l.name}</strong><div class=meta>${l.description}</div><div style="margin-top:6px">${l.nodeIds.map(id=>'<div>'+id+'</div>').join('')}</div></div>`).join('')
    }

    document.getElementById('search').addEventListener('input',(ev)=>{
      const q = ev.target.value.toLowerCase().trim()
      nodeListEl.innerHTML = ''
      nodes.filter(n=>{ return !q || n.name.toLowerCase().includes(q) || n.filePath.toLowerCase().includes(q) || (n.tags||[]).join(' ').toLowerCase().includes(q) }).forEach(n=> nodeListEl.appendChild(renderNodeItem(n)))
    })

    renderAll()

    // Select first node by default
    if(nodes.length) showDetails(nodes[0])

    // expose GRAPH for debugging
    window.G = GRAPH
  </script>
</body>
</html>
